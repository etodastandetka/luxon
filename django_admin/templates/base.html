<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Заявки - Управление транзакциями{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1a0a 0%, #0f2a0f 50%, #0a1a0a 100%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(22, 163, 74, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(22, 163, 74, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(22, 163, 74, 0.08) 0%, transparent 50%);
            animation: backgroundShift 20s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes backgroundShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* Мобильный контейнер */
        .mobile-container {
            max-width: 414px;
            margin: 0 auto;
            background: rgba(30, 30, 46, 0.3);
            backdrop-filter: blur(20px);
            height: 100vh !important;
            max-height: 100vh !important;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
            border-radius: 0;
            border: 1px solid rgba(138, 43, 226, 0.1);
            padding-bottom: 0 !important;
            overflow: hidden !important; /* Убираем скролл у контейнера */
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* Дополнительная фиксация для меню */
        body {
            padding-bottom: 0 !important;
            margin: 0 !important;
        }
        
        .bottom-nav {
            position: fixed !important;
            bottom: 0 !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 100% !important;
            max-width: 414px !important;
            background: rgba(30, 30, 46, 0.98) !important;
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(138, 43, 226, 0.2);
            display: flex !important;
            justify-content: space-around;
            padding: 12px 0 !important;
            z-index: 99999 !important;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
        }
        
        /* Принудительная фиксация */
        html, body {
            height: 100% !important;
            overflow-x: hidden !important;
            overflow-y: hidden !important; /* Убираем скролл у body */
        }
        
        /* Красивый скролл для всего body */
        body::-webkit-scrollbar {
            width: 8px;
        }
        
        body::-webkit-scrollbar-track {
            background: rgba(30, 30, 46, 0.3);
            border-radius: 4px;
        }
        
        body::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(138, 43, 226, 0.8), rgba(74, 42, 106, 0.8));
            border-radius: 4px;
            border: 1px solid rgba(138, 43, 226, 0.2);
        }
        
        body::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(138, 43, 226, 1), rgba(74, 42, 106, 1));
        }
        
        /* Адаптивность для разных экранов */
        @media (max-height: 600px) {
            .header {
                padding: 10px 20px;
            }
            .header h1 {
                font-size: 18px;
            }
            .header p {
                font-size: 11px;
            }
            .main-content {
                padding: 8px;
                padding-bottom: 80px; /* Отступ для меню */
                max-height: calc(100vh - 100px);
            }
            .card {
                padding: 12px;
                margin-bottom: 8px;
            }
        }
        
        @media (max-height: 500px) {
            .header {
                padding: 8px 20px;
            }
            .header h1 {
                font-size: 16px;
            }
            .header p {
                font-size: 10px;
            }
            .main-content {
                padding: 6px;
                padding-bottom: 80px; /* Отступ для меню */
                max-height: calc(100vh - 90px);
            }
            .card {
                padding: 10px;
                margin-bottom: 6px;
            }
        }
        
        @media (max-height: 400px) {
            .header {
                padding: 6px 20px;
            }
            .header h1 {
                font-size: 14px;
            }
            .header p {
                font-size: 9px;
            }
            .main-content {
                padding: 4px;
                padding-bottom: 80px; /* Отступ для меню */
                max-height: calc(100vh - 80px);
            }
            .card {
                padding: 8px;
                margin-bottom: 4px;
            }
        }
        
        
        /* Хедер */
        .header {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #cccccc;
            opacity: 0.8;
            font-size: 12px;
        }
        
        .header-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px; /* Уменьшаем размер */
            height: 30px; /* Уменьшаем размер */
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px; /* Уменьшаем радиус */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 16px; /* Уменьшаем размер иконки */
        }
        
        /* Основной контент */
        .main-content {
            padding: 10px;
            padding-bottom: 80px; /* Отступ для меню */
            background: transparent;
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
            /* Красивый скролл */
            scrollbar-width: thin;
            scrollbar-color: rgba(138, 43, 226, 0.5) rgba(30, 30, 46, 0.3);
        }
        
        /* Красивый скролл для WebKit браузеров */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .main-content::-webkit-scrollbar-track {
            background: rgba(30, 30, 46, 0.3);
            border-radius: 3px;
        }
        
        .main-content::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(34, 197, 94, 0.8), rgba(22, 163, 74, 0.8));
            border-radius: 3px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        
        .main-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(34, 197, 94, 1), rgba(22, 163, 74, 1));
        }
        
        /* Карточки */
        .card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.6), 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 15px rgba(34, 197, 94, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #666 0%, #555 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 18px;
            margin-right: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }
        
        .card-subtitle {
            font-size: 14px;
            color: #cccccc;
            margin-top: 5px;
        }
        
        /* Статистические карточки */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 4px 16px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Кнопки */
        .btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 12px 35px rgba(34, 197, 94, 0.6), 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .btn-danger {
            background: #ff4444;
            color: #ffffff;
        }
        
        .btn-danger:hover {
            background: #cc3333;
        }
        
        /* Навигация */
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #b0b0b0;
            transition: all 0.3s ease;
            padding: 8px 12px;
            position: relative;
            border-radius: 12px;
            background: transparent;
            min-width: 60px;
        }
        
        .nav-item:hover {
            color: #e0e0e0;
            background: rgba(34, 197, 94, 0.2);
            transform: translateY(-2px);
        }
        
        .nav-item.active {
            color: #ffffff;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border: 1px solid rgba(34, 197, 94, 0.6);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        
        @keyframes slideIn {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 30px;
                opacity: 1;
            }
        }
        
        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }
        
        .nav-item.active i {
            transform: scale(1.1);
        }
        
        .nav-item span {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .nav-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            position: absolute;
            top: 4px;
            right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* Формы */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
            backdrop-filter: blur(10px);
            color: #ffffff;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .form-control:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2), 0 12px 35px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }
        
        /* Списки */
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 255, 136, 0.1);
            border: 1px solid #333333;
        }
        
        .list-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            margin-right: 15px;
        }
        
        .list-content {
            flex: 1;
        }
        
        .list-title {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
        }
        
        .list-subtitle {
            font-size: 12px;
            color: #cccccc;
        }
        
        .list-amount {
            font-weight: bold;
            color: #00ff88;
            font-size: 16px;
        }
        
        .list-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-success {
            background: #00ff88;
        }
        
        .status-warning {
            background: #ffaa00;
        }
        
        .status-danger {
            background: #ff4444;
        }
        
        /* Меню оверлей */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
        }
        
        .menu-content {
            background: #1a1a1a;
            width: 100%;
            max-width: 414px;
            margin: 0 auto;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .menu-header h3 {
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
        }
        
        .menu-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #cccccc;
            cursor: pointer;
            padding: 5px;
        }
        
        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #333333;
            border-radius: 10px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        
        .menu-item:hover {
            background: #444444;
        }
        
        .menu-item i {
            margin-right: 15px;
            font-size: 18px;
            color: #00ff88;
        }
        
        .menu-item span {
            font-weight: 500;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .mobile-container {
                max-width: 100%;
                box-shadow: none;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <a href="{% url 'dashboard:dashboard' %}" class="nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </a>
            <a href="{% url 'dashboard:history' %}" class="nav-item {% if request.resolver_match.url_name == 'history' %}active{% endif %}">
                <i class="fas fa-history"></i>
                <span>История</span>
            </a>
            <a href="{% url 'dashboard:wallet' %}" class="nav-item {% if request.resolver_match.url_name == 'wallet' %}active{% endif %}">
                <i class="fas fa-wallet"></i>
                <span>Кошелек</span>
            </a>
            <a href="{% url 'dashboard:menu' %}" class="nav-item {% if request.resolver_match.url_name == 'menu' %}active{% endif %}">
                <i class="fas fa-bars"></i>
                <span>Меню</span>
            </a>
        </nav>


        <!-- Хедер -->
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-{% block header_icon %}chart-bar{% endblock %}"></i>
            </div>
            <h1>{% block header_title %}Заявки{% endblock %}</h1>
            <p>{% block header_subtitle %}Управление транзакциями{% endblock %}</p>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>


        <!-- Меню оверлей -->
        <div id="menu-overlay" class="menu-overlay" style="display: none;">
            <div class="menu-content">
                <div class="menu-header">
                    <h3>Меню</h3>
                    <button onclick="toggleMenu()" class="menu-close">×</button>
                </div>
                <div class="menu-items">
                    <a href="{% url 'bot_control:autodeposit_settings' %}" class="menu-item">
                        <i class="fas fa-robot"></i>
                        <span>Автопополнение</span>
                    </a>
                    <a href="{% url 'bot_control:statistics' %}" class="menu-item">
                        <i class="fas fa-chart-bar"></i>
                        <span>Статистика</span>
                    </a>
                    <a href="{% url 'dashboard:wallet' %}" class="menu-item">
                        <i class="fas fa-wallet"></i>
                        <span>Кошелек</span>
                    </a>
                    <a href="/admin/" target="_blank" class="menu-item">
                        <i class="fas fa-database"></i>
                        <span>Django Admin</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Обновление времени
        function updateTime() {
            const el = document.getElementById('current-time');
            if (!el) return; // элемент не используется на всех страницах
            const now = new Date();
            const timeString = now.toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            el.textContent = timeString;
        }
        
        // Обновляем время каждую минуту
        updateTime();
        setInterval(updateTime, 60000);
        
        // Переключение меню
        function toggleMenu() {
            const overlay = document.getElementById('menu-overlay');
            if (overlay.style.display === 'none') {
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }
        
        // Закрытие меню при клике вне его
        document.getElementById('menu-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                toggleMenu();
            }
        });
        
        // Принудительная фиксация меню
        function fixBottomNav() {
            const bottomNav = document.querySelector('.bottom-nav');
            if (bottomNav) {
                bottomNav.style.position = 'fixed';
                bottomNav.style.bottom = '0';
                bottomNav.style.left = '50%';
                bottomNav.style.transform = 'translateX(-50%)';
                bottomNav.style.width = '100%';
                bottomNav.style.maxWidth = '414px';
                bottomNav.style.zIndex = '99999';
                bottomNav.style.display = 'flex';
            }
        }
        
        // Фиксируем меню при загрузке и скролле
        document.addEventListener('DOMContentLoaded', fixBottomNav);
        window.addEventListener('scroll', fixBottomNav);
        window.addEventListener('resize', fixBottomNav);
        
        // Дополнительная проверка каждые 100мс
        setInterval(fixBottomNav, 100);
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
